<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let dados = [10, 20, 30, 40];
        let valor = 25;
        let posicao = 0;
        dados.push(0); // abre uma posição no final
        console.log(dados)
        for (let i = dados.length - 1; i > posicao; i--) {
        dados[i] = dados[i - 1];
        console.log("Vetor na " + (dados.length-i) + "° passagem: " + dados)
        }
        dados[posicao] = valor;
        console.log(dados);
    </script>
</body>
</html>
